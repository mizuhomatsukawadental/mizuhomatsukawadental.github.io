<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
    background-color: #f6f9f4;
    color: #333;
}

/* メインビジュアル（写真） */
.hero {
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),

    justify-content: center;

    text-align: center;
    padding: 10px;
}
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #2e7d32;
    font-weight: bold;
}

/* セクション */
section {
    padding: 40px 20px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

h2 {
    color: #4caf50;
}

footer {
    background: #81c784;
    color: white;
    text-align: center;
    padding: 15px;
}

button {
    background: #66bb6a;
    color: white;
    border: none;
